site:
  title: MkDocsGen
  description: Markdownから静的ドキュメントサイトを生成するドキュメントビルダー
  base_url: /

docs_dir: docs
output_dir: site

nav:
  - title: ホーム
    path: index.md
  - title: はじめに
    path: guide/getting-started.md
  - title: 設定
    path: guide/configuration.md
  - title: 執筆ガイド
    path: guide/writing.md
  - title: Markdown拡張
    path: guide/markdown.md
  - title: テーマ
    path: guide/theming.md
  - title: PyDoc
    path: guide/pydoc.md
  - title: プラグイン
    path: guide/plugins.md
  - title: CLIリファレンス
    path: reference/cli.md
  - title: 設定スキーマ
    path: reference/config.md
  - title: テンプレートコンテキスト変数
    path: reference/template-context.md

exclude: []

theme:
  overrides_dir: theme_overrides
  default_mode: auto
  custom_css: []

markdown:
  allow_html: true

pydoc:
  source_dirs:
    - docs/_samples

plugins: []

serve:
  port: 3000
