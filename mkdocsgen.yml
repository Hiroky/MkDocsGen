site:
  title: MkDocsGen
  description: Markdownから静的ドキュメントサイトを生成するドキュメントビルダー
  base_url: /

docs_dir: docs
output_dir: site

# ディレクトリ指定でセクション配下をツリーのまま載せる（ページ単位列挙だと階層が潰れる）
nav:
  - title: ホーム
    path: index.md
  - title: ガイド
    path: guide/
  - title: リファレンス
    path: reference/
  - title: サンプル
    path: samples/

exclude:
  - _samples/**

theme:
  overrides_dir: theme_overrides
  default_mode: auto
  custom_css: []

markdown:
  allow_html: true

pydoc:
  source_dirs:
    - docs/_samples

plugins: []

serve:
  port: 3000
